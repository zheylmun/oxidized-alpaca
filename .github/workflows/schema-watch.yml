name: "Alpaca API Compatibility"

# Runs the live-API integration tests on a schedule so that schema changes
# on Alpaca's side (fields added, removed, or retyped) are caught even when
# there are no pushes to the repository. On failure it opens — or comments on
# an already-open — GitHub issue so the maintainer is notified.
on:
  schedule:
    # Twice weekly: Monday and Thursday at 13:00 UTC.
    - cron: "0 13 * * 1,4"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  compat:
    name: Live API Compatibility Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ALPACA_PAPER_API_KEY_ID: ${{ secrets.ALPACA_PAPER_API_KEY_ID }}
      ALPACA_PAPER_API_SECRET_KEY: ${{ secrets.ALPACA_PAPER_API_SECRET_KEY }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Setup Rust Toolchain"
        uses: dtolnay/rust-toolchain@stable

      # Unset GitHub secrets are injected as empty strings, and the crate loads
      # credentials via `env::var`, which treats "" as present. Without this
      # guard the live tests would run with blank credentials and fail on auth,
      # triggering a misleading "API compatibility" issue below. Fail fast with
      # a clear message instead.
      - name: "Verify Alpaca credentials are configured"
        run: |
          if [ -z "${ALPACA_PAPER_API_KEY_ID:-}" ] || [ -z "${ALPACA_PAPER_API_SECRET_KEY:-}" ]; then
            echo "::error::Alpaca paper API secrets are missing or empty. Configure ALPACA_PAPER_API_KEY_ID and ALPACA_PAPER_API_SECRET_KEY in the repository secrets."
            exit 1
          fi

      # Mirrors the main CI test step: exercises every covered endpoint against
      # the live paper API and deserializes real responses into the crate types.
      - name: "Run live API integration tests"
        id: tests
        run: cargo test --all-features -- --skip env

      # Only file an issue for an actual test failure — not for a missing-secrets
      # preflight failure, which is a repo-config problem, not API drift.
      - name: "Report failure as an issue"
        if: failure() && steps.tests.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          title="Alpaca API compatibility check failing"
          label="schema-watch"

          # Ensure the label exists (ignore error if it already does).
          gh label create "$label" \
            --color B60205 \
            --description "Automated Alpaca API compatibility check" \
            2>/dev/null || true

          # Reuse an already-open issue so a sustained outage produces one
          # thread rather than a new issue per run.
          existing="$(gh issue list --state open --label "$label" \
            --json number --jq '.[0].number // empty')"

          body="The scheduled Alpaca API compatibility check failed.

          This usually means Alpaca changed a response schema (a field was added, removed, or retyped) and one of the crate's types no longer deserializes, or the paper API was unreachable.

          Failed run: ${RUN_URL}"

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Still failing as of the latest run: ${RUN_URL}"
          else
            gh issue create --title "$title" --label "$label" --body "$body"
          fi
